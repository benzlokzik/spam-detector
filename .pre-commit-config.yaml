repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer

- repo: local
  hooks:
    - id: commit-message-style
      name: commit message style
      language: pygrep
      entry: '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-zA-Z0-9\-._]+\))?(!)?: [A-Za-z0-9](?:[^\n]*(?:\.\.\.|\.[a-zA-Z0-9]|[^\n.][^\n.])|[^\n.])?(\n[\s\S]*)?$'
      args: [--multiline, --negate]
      stages: [commit-msg]
      always_run: true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install dev dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Wheel must be code-only
        run: |
          python3 - <<'PY'
          import glob, sys, zipfile
          whl = glob.glob("dist/*.whl")[0]
          bad = [
              n for n in zipfile.ZipFile(whl).namelist()
              if "/data/" in n
              or "spam-detector-bert-onnx" in n
              or n.endswith((".bin", ".parquet"))
          ]
          if bad:
              print("wheel bundles weights/data:", bad)
              sys.exit(1)
          print("code-only wheel:", whl)
          PY

      - name: Install with sklearn extra and import without torch
        run: |
          uv python install ${{ matrix.python-version }}
          uv venv --python ${{ matrix.python-version }} .smoke
          uv pip install --python .smoke/bin/python "$(ls dist/*.whl)[sklearn]"
          .smoke/bin/python - <<'PY'
          import importlib.util as u
          import sys
          import spam_detector  # noqa: F401
          from spam_detector import get_spam_model  # noqa: F401
          from spam_detector.linear.sk_model import SklearnSpamModel  # noqa: F401
          assert u.find_spec("torch") is None, "torch must not be pulled by [sklearn]"
          assert u.find_spec("fasttext") is None, "fasttext must not be pulled by [sklearn]"
          print("sklearn-only import ok on", sys.version.split()[0])
          PY

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra chromadb --group dev

      - name: Run unit tests
        run: |
          mkdir -p logs
          uv run pytest tests/test_vectordb_rag_model.py \
            --html=logs/report.html --self-contained-html --junitxml=logs/junit.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: logs/
          retention-days: 14
